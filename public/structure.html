<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Golden Project 项目结构</title>
    <script>
      (function () {
        const assetBase = location.protocol === 'file:' ? './' : '/console/assets/';
        const style = document.createElement('link');
        style.rel = 'stylesheet';
        style.href = `${assetBase}dashboard.css`;
        document.head.appendChild(style);
        window.__STRUCTURE_ASSET_BASE__ = assetBase;
      })();
    </script>
    <!-- React Flow CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reactflow@11.11.4/dist/style.css" />
    <style>
      /* ===== 布局调整 ===== */
      .structure-shell {
        display: flex;
        flex-direction: column;
        min-height: calc(100vh - 24px - 48px);
      }

      /* ===== React Flow 画布容器 ===== */
      .rf-container {
        flex: 1;
        min-height: 400px;
        border-radius: 0 0 28px 28px;
        overflow: hidden;
        position: relative;
      }
      .rf-container .react-flow__background {
        background: rgba(255, 251, 244, 0.54) !important;
      }
      .rf-container .react-flow__controls {
        bottom: 14px;
        right: 14px;
        left: auto;
        top: auto;
      }
      .rf-container .react-flow__controls-button {
        width: 30px;
        height: 30px;
        border-color: rgba(31, 36, 31, 0.08);
        color: var(--ink);
      }

      /* ===== 编辑区 + 画布面板 ===== */
      .structure-body-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        margin-top: 16px;
        border-radius: 28px;
        background: var(--paper);
        border: 1px solid rgba(255, 255, 255, 0.42);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .structure-body-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 16px 20px;
        border-bottom: 1px solid rgba(31, 36, 31, 0.06);
        flex-shrink: 0;
      }
      .structure-body-header h3 {
        margin: 0;
        font-size: 18px;
        letter-spacing: -0.03em;
      }
      .structure-body-header p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .structure-editor-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .add-module-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        border: 1px solid rgba(191, 90, 54, 0.2);
        border-radius: 999px;
        padding: 7px 13px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font: inherit;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
        transition: transform 160ms ease, box-shadow 160ms ease;
        white-space: nowrap;
      }
      .add-module-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 18px rgba(191, 90, 54, 0.14);
      }

      .save-all-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        border: 0;
        border-radius: 999px;
        padding: 7px 15px;
        background: linear-gradient(135deg, var(--accent) 0%, #d88b45 100%);
        color: #fff7ef;
        font: inherit;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 8px 18px rgba(191, 90, 54, 0.18);
        transition: transform 160ms ease, box-shadow 160ms ease;
        white-space: nowrap;
      }
      .save-all-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 22px rgba(191, 90, 54, 0.26);
      }
      .save-all-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }
      .save-status {
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
        white-space: nowrap;
      }

      /* ===== 模块卡片列表 ===== */
      .module-cards {
        display: grid;
        gap: 8px;
        padding: 10px 16px;
        max-height: 240px;
        overflow-y: auto;
        flex-shrink: 0;
        border-bottom: 1px solid rgba(31, 36, 31, 0.04);
      }
      .module-cards::-webkit-scrollbar {
        width: 6px;
      }
      .module-cards::-webkit-scrollbar-thumb {
        border-radius: 999px;
        background: rgba(31, 36, 31, 0.12);
      }
      .module-cards::-webkit-scrollbar-track {
        background: transparent;
      }

      .module-card {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid rgba(31, 36, 31, 0.07);
        background: rgba(255, 255, 255, 0.68);
        transition: border-color 160ms ease, box-shadow 160ms ease;
      }
      .module-card:hover {
        border-color: rgba(191, 90, 54, 0.12);
        box-shadow: 0 4px 10px rgba(34, 28, 16, 0.05);
      }
      .module-card-main {
        min-width: 0;
        display: grid;
        gap: 3px;
      }
      .module-card-main h4 {
        margin: 0;
        font-size: 14px;
        font-weight: 700;
      }
      .module-card-main p {
        margin: 0;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.5;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .module-card-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 2px;
      }
      .module-card-meta span {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        padding: 3px 6px;
        border-radius: 6px;
        background: rgba(31, 36, 31, 0.04);
        font-size: 10px;
        color: var(--muted);
        font-weight: 600;
      }
      .module-card-meta strong {
        color: var(--ink);
        font-weight: 800;
      }
      .module-card-actions {
        display: flex;
        align-items: center;
        gap: 5px;
        flex-shrink: 0;
      }
      .module-card-actions button {
        border: 0;
        border-radius: 8px;
        padding: 6px 9px;
        font: inherit;
        font-size: 11px;
        font-weight: 800;
        cursor: pointer;
        transition: background 160ms ease;
      }
      .edit-module-btn {
        background: var(--accent-soft);
        color: var(--accent-strong);
      }
      .edit-module-btn:hover {
        background: rgba(191, 90, 54, 0.22);
      }
      .delete-module-btn {
        background: rgba(166, 63, 47, 0.08);
        color: #a63f2f;
      }
      .delete-module-btn:hover {
        background: rgba(166, 63, 47, 0.16);
      }
      .module-card-empty {
        text-align: center;
        padding: 30px 16px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      /* ===== 自定义 React Flow 节点 ===== */
      .gp-rf-node {
        min-width: 200px;
        max-width: 250px;
        padding: 10px 12px 8px;
        border-radius: 14px;
        border: 2px solid rgba(31, 36, 31, 0.1);
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 4px 12px rgba(34, 28, 16, 0.08);
        font-family: "Hiragino Sans GB", "PingFang SC", "Microsoft YaHei", sans-serif;
        transition: border-color 160ms ease, box-shadow 160ms ease;
      }
      .gp-rf-node:hover {
        border-color: rgba(191, 90, 54, 0.2);
        box-shadow: 0 6px 16px rgba(34, 28, 16, 0.1);
      }
      .gp-rf-node.selected {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(191, 90, 54, 0.14), 0 6px 16px rgba(34, 28, 16, 0.1);
      }
      .gp-rf-node-header {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .gp-rf-node-index {
        display: inline-flex;
        align-items: center;
        padding: 2px 5px;
        border-radius: 5px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-size: 9px;
        font-weight: 900;
        letter-spacing: 0.04em;
        flex-shrink: 0;
      }
      .gp-rf-node-header h4 {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.3;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .gp-rf-node-desc {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 10px;
        line-height: 1.4;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .gp-rf-node-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 6px;
      }
      .gp-rf-node-meta span {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        padding: 2px 5px;
        border-radius: 5px;
        background: rgba(31, 36, 31, 0.04);
        font-size: 9px;
        color: var(--muted);
        font-weight: 600;
      }
      .gp-rf-node-meta strong {
        color: var(--ink);
        font-weight: 800;
      }
      .gp-rf-node-progress {
        height: 4px;
        margin-top: 6px;
        border-radius: 999px;
        background: rgba(31, 36, 31, 0.08);
        overflow: hidden;
      }
      .gp-rf-node-progress-bar {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #5eb551, #a3c95a);
        transition: width 240ms ease;
      }

      /* ===== Root 节点 ===== */
      .gp-rf-root {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 16px;
        border-radius: 16px;
        border: 2px solid rgba(191, 90, 54, 0.18);
        background: linear-gradient(135deg, rgba(255, 251, 244, 0.98), rgba(248, 242, 231, 0.95));
        box-shadow: 0 6px 18px rgba(34, 28, 16, 0.1);
        min-width: 160px;
        font-family: "Hiragino Sans GB", "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      .gp-rf-root.selected {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(191, 90, 54, 0.14), 0 6px 18px rgba(34, 28, 16, 0.12);
      }
      .gp-rf-root-icon {
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), #d88b45);
        color: #fff;
        font-size: 14px;
        font-weight: 900;
        flex-shrink: 0;
      }
      .gp-rf-root h4 {
        margin: 0;
        font-size: 15px;
        font-weight: 800;
      }
      .gp-rf-root p {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 10px;
      }

      /* ===== 加载 / 错误状态 ===== */
      .rf-loading,
      .rf-error {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        min-height: 300px;
        color: var(--muted);
        font-size: 14px;
        gap: 10px;
      }
      .rf-error {
        color: var(--danger);
      }
      .rf-error button {
        margin-top: 8px;
        border: 1px solid rgba(166, 63, 47, 0.2);
        border-radius: 999px;
        padding: 8px 14px;
        background: transparent;
        color: var(--danger);
        font: inherit;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
      }

      /* ===== 新增模块弹窗 ===== */
      .add-modal-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      /* ===== Hero 微调 ===== */
      .structure-hero {
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <main class="shell structure-shell">
      <!-- ===== 顶部：Hero 区域（保留） ===== -->
      <section class="structure-hero" id="heroSection">
        <div>
          <a class="back-link" id="backToDashboard" href="/console/dashboard">返回 dashboard</a>
          <div class="eyebrow"><span>STRUCTURE MODE</span></div>
          <h1 id="structureProjectName">项目结构</h1>
          <p id="structureProjectMeta">编辑模块内容，拖拽画布节点，修改后点击保存。</p>
        </div>
        <aside class="structure-switcher">
          <label for="structureProjectSelect">项目切换</label>
          <select id="structureProjectSelect">
            <option value="">正在加载项目列表...</option>
          </select>
          <button class="button primary" id="loadStructureProject" type="button">加载结构</button>
          <p class="subtle" id="structureStatus">正在准备结构页...</p>
        </aside>
      </section>

      <!-- ===== React 根容器 ===== -->
      <div id="react-root" style="flex:1;display:flex;flex-direction:column;min-height:0;margin-top:16px;">
        <div class="rf-loading">加载 React Flow 中...</div>
      </div>
    </main>

    <!-- ===== 编辑模块弹窗 ===== -->
    <div class="modal-backdrop" id="moduleEditModal" aria-hidden="true">
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="moduleEditTitle">
        <div class="modal-header">
          <div>
            <div class="eyebrow compact-eyebrow">Module Edit</div>
            <h3 id="moduleEditTitle">编辑模块</h3>
            <p>修改模块信息后，画布节点数据会同步更新。</p>
          </div>
          <button class="modal-close" id="closeModuleEdit" type="button" aria-label="关闭">×</button>
        </div>
        <form class="modal-form" id="moduleEditForm">
          <input id="editModuleNodeId" type="hidden" />
          <input id="editModuleId" type="hidden" />
          <div class="modal-grid">
            <div class="field">
              <label for="editModuleName">模块名称</label>
              <input id="editModuleName" />
            </div>
            <div class="field">
              <label for="editLeaderName">负责人</label>
              <input id="editLeaderName" name="leaderName" list="projectMemberNames" placeholder="输入负责人" />
              <datalist id="projectMemberNames"></datalist>
            </div>
          </div>
          <div class="field">
            <label for="editModuleDescription">模块说明</label>
            <textarea id="editModuleDescription" name="description" rows="3"></textarea>
          </div>
          <div class="modal-actions">
            <button class="button secondary" id="cancelModuleEdit" type="button">取消</button>
            <button class="button primary" type="submit">保存</button>
          </div>
        </form>
      </section>
    </div>

    <!-- ===== 新增模块弹窗 ===== -->
    <div class="modal-backdrop" id="addModuleModal" aria-hidden="true">
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="addModuleTitle">
        <div class="modal-header">
          <div>
            <div class="eyebrow compact-eyebrow">New Module</div>
            <h3 id="addModuleTitle">新增模块</h3>
            <p>创建新的模块节点，自动挂载到根节点下。</p>
          </div>
          <button class="modal-close" id="closeAddModule" type="button" aria-label="关闭">×</button>
        </div>
        <form class="modal-form" id="addModuleForm">
          <div class="field">
            <label for="addModuleName">模块名称 *</label>
            <input id="addModuleName" required placeholder="输入模块名称" />
          </div>
          <div class="field">
            <label for="addModuleDescription">模块说明</label>
            <textarea id="addModuleDescription" rows="3" placeholder="输入模块说明（可选）"></textarea>
          </div>
          <div class="field">
            <label for="addLeaderName">负责人</label>
            <input id="addLeaderName" list="projectMemberNamesAdd" placeholder="输入负责人（可选）" />
            <datalist id="projectMemberNamesAdd"></datalist>
          </div>
          <div class="modal-actions">
            <button class="button secondary" id="cancelAddModule" type="button">取消</button>
            <button class="button primary" type="submit">创建模块</button>
          </div>
        </form>
      </section>
    </div>

    <!-- ===== CDN 依赖 ===== -->
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reactflow@11.11.4/dist/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/htm@3.1.1/dist/htm.min.js"></script>

    <!-- ===== 主应用 ===== -->
    <script src="/console/assets/structure.js"></script>
  </body>
</html>
